<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SynergySphere — Connected Workspaces for Teams That Ship</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --brand: #5b57f5;
      --brand-deep: #4a45df;
      --brand-light: #7b78ff;
      --brand-soft: #e7e9ff;
      --text: #15233b;
      --text-soft: #52627c;
      --text-faint: #8191aa;
      --surface: #ffffff;
      --bg: #f4f6fb;
      --line: #dbe1ef;
      --ok: #1f9d66;
      --warn: #c77c11;
      --danger: #c93b54;
      --teal: #0a7f8b;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: #0b0d17;
      color: #e8eaf6;
      overflow-x: hidden;
    }
    a { color: inherit; text-decoration: none; }
    button { cursor: pointer; font: inherit; }

    /* ── NOISE OVERLAY ── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 0;
    }

    /* ── NAV ── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 48px;
      background: rgba(11, 13, 23, 0.7);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      transition: background 0.3s;
    }
    .nav-brand { display: flex; align-items: center; gap: 12px; }
    .nav-badge {
      width: 40px; height: 40px; border-radius: 12px;
      background: linear-gradient(135deg, #6b68ff 0%, #4a45df 100%);
      display: grid; place-items: center;
      font-weight: 900; font-size: 1rem; color: #fff;
      box-shadow: 0 8px 24px rgba(91,87,245,0.4);
    }
    .nav-name { font-weight: 800; font-size: 1.15rem; letter-spacing: -0.03em; color: #fff; }
    .nav-links { display: flex; align-items: center; gap: 32px; }
    .nav-links a { font-weight: 600; font-size: 0.92rem; color: rgba(255,255,255,0.65); transition: color 0.2s; }
    .nav-links a:hover { color: #fff; }
    .nav-cta {
      background: linear-gradient(135deg, var(--brand) 0%, var(--brand-deep) 100%);
      color: #fff; font-weight: 700; font-size: 0.92rem;
      padding: 10px 22px; border-radius: 12px; border: none;
      box-shadow: 0 8px 24px rgba(91,87,245,0.35);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .nav-cta:hover { transform: translateY(-1px); box-shadow: 0 12px 28px rgba(91,87,245,0.45); }

    /* ── HERO ── */
    .hero {
      position: relative; min-height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center; padding: 120px 24px 80px;
      overflow: hidden;
    }
    .hero-glow {
      position: absolute; top: -20%; left: 50%; transform: translateX(-50%);
      width: 900px; height: 700px; border-radius: 50%;
      background: radial-gradient(ellipse, rgba(91,87,245,0.22) 0%, rgba(91,87,245,0.06) 50%, transparent 70%);
      pointer-events: none;
      animation: pulseGlow 6s ease-in-out infinite;
    }
    @keyframes pulseGlow {
      0%, 100% { opacity: 1; transform: translateX(-50%) scale(1); }
      50% { opacity: 0.7; transform: translateX(-50%) scale(1.08); }
    }
    .hero-orb {
      position: absolute; border-radius: 50%; pointer-events: none;
      animation: floatOrb 8s ease-in-out infinite;
    }
    .hero-orb-1 {
      width: 320px; height: 320px; top: 10%; left: -8%;
      background: radial-gradient(circle, rgba(91,87,245,0.15), transparent 70%);
      animation-delay: 0s;
    }
    .hero-orb-2 {
      width: 240px; height: 240px; top: 20%; right: -5%;
      background: radial-gradient(circle, rgba(10,127,139,0.12), transparent 70%);
      animation-delay: -3s;
    }
    .hero-orb-3 {
      width: 180px; height: 180px; bottom: 15%; left: 10%;
      background: radial-gradient(circle, rgba(201,59,84,0.1), transparent 70%);
      animation-delay: -5s;
    }
    @keyframes floatOrb {
      0%, 100% { transform: translateY(0px) scale(1); }
      50% { transform: translateY(-30px) scale(1.05); }
    }
    .hero-badge {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(91,87,245,0.12); border: 1px solid rgba(91,87,245,0.3);
      border-radius: 999px; padding: 6px 16px;
      font-size: 0.82rem; font-weight: 700; color: #a5a3ff;
      letter-spacing: 0.04em; text-transform: uppercase;
      margin-bottom: 28px;
      animation: fadeSlideDown 0.8s ease both;
    }
    .hero-badge-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: #5b57f5;
      box-shadow: 0 0 8px rgba(91,87,245,0.8);
      animation: blink 2s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .hero-title {
      font-size: clamp(2.8rem, 7vw, 5.5rem);
      font-weight: 900; letter-spacing: -0.04em; line-height: 1.05;
      color: #fff; max-width: 900px;
      animation: fadeSlideDown 0.9s ease 0.1s both;
    }
    .hero-title .gradient-text {
      background: linear-gradient(135deg, #7b78ff 0%, #a78bfa 40%, #38bdf8 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .hero-sub {
      margin-top: 24px; max-width: 580px;
      font-size: clamp(1rem, 1.8vw, 1.2rem); font-weight: 500;
      color: rgba(255,255,255,0.55); line-height: 1.7;
      animation: fadeSlideDown 1s ease 0.2s both;
    }
    .hero-actions {
      display: flex; align-items: center; gap: 16px; margin-top: 40px; flex-wrap: wrap; justify-content: center;
      animation: fadeSlideDown 1s ease 0.3s both;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--brand) 0%, var(--brand-deep) 100%);
      color: #fff; font-weight: 800; font-size: 1.05rem;
      padding: 16px 36px; border-radius: 16px; border: none;
      box-shadow: 0 16px 40px rgba(91,87,245,0.4);
      transition: transform 0.15s, box-shadow 0.15s;
      display: inline-flex; align-items: center; gap: 10px;
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 20px 48px rgba(91,87,245,0.5); }
    .btn-ghost {
      background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.8); font-weight: 700; font-size: 1.05rem;
      padding: 16px 32px; border-radius: 16px;
      transition: background 0.2s, border-color 0.2s;
      display: inline-flex; align-items: center; gap: 10px;
    }
    .btn-ghost:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.2); }
    .hero-trust {
      margin-top: 56px; display: flex; align-items: center; gap: 12px;
      color: rgba(255,255,255,0.35); font-size: 0.85rem; font-weight: 600;
      animation: fadeSlideDown 1s ease 0.4s both;
    }
    .trust-avatars { display: flex; }
    .trust-avatar {
      width: 32px; height: 32px; border-radius: 50%;
      border: 2px solid #0b0d17;
      display: grid; place-items: center;
      font-size: 0.7rem; font-weight: 800; color: #fff;
      margin-left: -8px;
    }
    .trust-avatar:first-child { margin-left: 0; }
    @keyframes fadeSlideDown {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── DASHBOARD PREVIEW ── */
    .hero-preview {
      position: relative; margin-top: 72px; width: 100%; max-width: 1100px;
      animation: fadeSlideDown 1.1s ease 0.5s both;
    }
    .preview-glow {
      position: absolute; bottom: -40px; left: 50%; transform: translateX(-50%);
      width: 80%; height: 80px;
      background: radial-gradient(ellipse, rgba(91,87,245,0.35), transparent 70%);
      filter: blur(20px); pointer-events: none;
    }
    .preview-frame {
      border-radius: 20px; overflow: hidden;
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 40px 120px rgba(0,0,0,0.6), 0 0 0 1px rgba(91,87,245,0.15);
      background: #12141f;
    }
    .preview-bar {
      background: #1a1d2e; padding: 12px 18px;
      display: flex; align-items: center; gap: 8px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .preview-dot { width: 10px; height: 10px; border-radius: 50%; }
    .preview-dot-r { background: #ff5f57; }
    .preview-dot-y { background: #febc2e; }
    .preview-dot-g { background: #28c840; }
    .preview-url {
      flex: 1; background: rgba(255,255,255,0.05); border-radius: 6px;
      padding: 5px 12px; font-size: 0.75rem; color: rgba(255,255,255,0.3);
      margin: 0 12px; font-family: monospace;
    }
    .preview-body {
      display: grid; grid-template-columns: 220px 1fr;
      min-height: 380px;
    }
    .preview-sidebar {
      background: rgba(255,255,255,0.03);
      border-right: 1px solid rgba(255,255,255,0.06);
      padding: 20px 14px; display: flex; flex-direction: column; gap: 6px;
    }
    .preview-brand-row {
      display: flex; align-items: center; gap: 10px; padding: 4px 6px; margin-bottom: 14px;
    }
    .preview-brand-badge {
      width: 34px; height: 34px; border-radius: 10px;
      background: linear-gradient(135deg, #6b68ff, #4a45df);
      display: grid; place-items: center;
      font-weight: 900; font-size: 0.75rem; color: #fff;
    }
    .preview-brand-name { font-weight: 800; font-size: 0.85rem; color: rgba(255,255,255,0.9); }
    .preview-nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 10px; border-radius: 10px;
      font-size: 0.78rem; font-weight: 600; color: rgba(255,255,255,0.4);
    }
    .preview-nav-item.active {
      background: rgba(91,87,245,0.15); color: #a5a3ff;
    }
    .preview-nav-dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; flex-shrink: 0; }
    .preview-main { padding: 20px; display: flex; flex-direction: column; gap: 16px; }
    .preview-topbar {
      background: rgba(255,255,255,0.04); border-radius: 12px;
      padding: 12px 16px; display: flex; align-items: center; justify-content: space-between;
    }
    .preview-title { font-weight: 800; font-size: 0.95rem; color: rgba(255,255,255,0.9); }
    .preview-subtitle { font-size: 0.72rem; color: rgba(255,255,255,0.3); margin-top: 2px; }
    .preview-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
    .preview-stat {
      background: rgba(255,255,255,0.04); border-radius: 12px;
      padding: 14px; border: 1px solid rgba(255,255,255,0.06);
    }
    .preview-stat-val { font-weight: 900; font-size: 1.4rem; color: #fff; }
    .preview-stat-label { font-size: 0.68rem; color: rgba(255,255,255,0.35); margin-top: 2px; font-weight: 600; }
    .preview-stat-bar { height: 3px; border-radius: 2px; margin-top: 8px; background: rgba(255,255,255,0.08); overflow: hidden; }
    .preview-stat-fill { height: 100%; border-radius: 2px; }
    .preview-projects { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .preview-project-card {
      background: rgba(255,255,255,0.04); border-radius: 12px;
      padding: 14px; border: 1px solid rgba(255,255,255,0.06);
    }
    .preview-project-name { font-weight: 700; font-size: 0.8rem; color: rgba(255,255,255,0.85); }
    .preview-project-meta { font-size: 0.68rem; color: rgba(255,255,255,0.3); margin-top: 3px; }
    .preview-progress { height: 4px; border-radius: 2px; background: rgba(255,255,255,0.08); margin-top: 10px; overflow: hidden; }
    .preview-progress-fill { height: 100%; border-radius: 2px; background: linear-gradient(90deg, #5b57f5, #7b78ff); }

    /* ── STATS BAND ── */
    .stats-band {
      position: relative; padding: 60px 48px;
      border-top: 1px solid rgba(255,255,255,0.06);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      background: rgba(255,255,255,0.02);
    }
    .stats-band-inner {
      max-width: 1100px; margin: 0 auto;
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 40px; text-align: center;
    }
    .stat-item-val {
      font-size: clamp(2rem, 4vw, 3rem); font-weight: 900;
      background: linear-gradient(135deg, #fff 0%, rgba(255,255,255,0.6) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .stat-item-label { font-size: 0.9rem; color: rgba(255,255,255,0.4); font-weight: 600; margin-top: 6px; }

    /* ── FEATURES ── */
    .section { padding: 100px 48px; max-width: 1200px; margin: 0 auto; }
    .section-label {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(91,87,245,0.1); border: 1px solid rgba(91,87,245,0.25);
      border-radius: 999px; padding: 5px 14px;
      font-size: 0.78rem; font-weight: 700; color: #a5a3ff;
      letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 20px;
    }
    .section-title {
      font-size: clamp(2rem, 4vw, 3rem); font-weight: 900;
      letter-spacing: -0.04em; color: #fff; line-height: 1.1;
    }
    .section-sub {
      margin-top: 16px; font-size: 1.05rem; color: rgba(255,255,255,0.45);
      max-width: 520px; line-height: 1.7;
    }
    .features-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 60px;
    }
    .feature-card {
      background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.07);
      border-radius: 20px; padding: 32px;
      transition: transform 0.25s, border-color 0.25s, background 0.25s;
      position: relative; overflow: hidden;
    }
    .feature-card::before {
      content: ''; position: absolute; inset: 0; border-radius: 20px;
      background: radial-gradient(circle at 30% 30%, rgba(91,87,245,0.08), transparent 60%);
      opacity: 0; transition: opacity 0.3s;
    }
    .feature-card:hover { transform: translateY(-4px); border-color: rgba(91,87,245,0.3); background: rgba(91,87,245,0.05); }
    .feature-card:hover::before { opacity: 1; }
    .feature-icon {
      width: 52px; height: 52px; border-radius: 14px;
      display: grid; place-items: center; font-size: 1.5rem;
      margin-bottom: 20px;
    }
    .feature-name { font-weight: 800; font-size: 1.05rem; color: #fff; margin-bottom: 10px; }
    .feature-desc { font-size: 0.9rem; color: rgba(255,255,255,0.45); line-height: 1.65; }

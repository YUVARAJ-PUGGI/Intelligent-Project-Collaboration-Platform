<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Day - SynergySphere</title>
  <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-badge">SS</div>
        <div class="brand-copy">
          <h1>SynergySphere</h1>
          <p>Connected workspaces for teams that ship together.</p>
        </div>
      </div>

      <a class="new-project-btn" href="/tasks.html">Review Tasks</a>

      <nav class="nav">
        <a class="nav-link" href="/dashboard.html"><span class="nav-icon nav-dashboard"></span><span>Dashboard</span></a>
        <a class="nav-link" href="/projects.html"><span class="nav-icon nav-projects"></span><span>Projects</span></a>
        <a class="nav-link" href="/tasks.html"><span class="nav-icon nav-tasks"></span><span>Tasks</span></a>
        <a class="nav-link" href="/team.html"><span class="nav-icon nav-team"></span><span>Team</span></a>
        <a class="nav-link active" href="/myday.html"><span class="nav-icon nav-myday"></span><span>My Day</span></a>
        <a class="nav-link" href="/settings.html"><span class="nav-icon nav-settings"></span><span>Settings</span></a>
      </nav>

      <button class="sidebar-user" onclick="confirmLogout()">
        <div id="sidebar-avatar" class="avatar-lite">U</div>
        <div>
          <div class="name" id="sidebar-name">User</div>
          <div class="role" id="sidebar-role">Sign out</div>
        </div>
      </button>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <h2 class="page-title">My Day</h2>
          <p class="page-subtitle">Focus on the tasks that are overdue, due today, or coming up next.</p>
        </div>
        <div class="topbar-actions">
          <div class="user-chip" id="topbar-user"></div>
        </div>
      </header>

      <section class="content">
        <div class="list" id="task-list"></div>
      </section>
    </main>
  </div>

  <script src="/assets/js/api.js"></script>
  <script>
    if (!requireAuth()) throw new Error('auth required');

    const user = getUser();
    document.getElementById('sidebar-avatar').textContent = initials(user.name);
    document.getElementById('sidebar-name').textContent = user.name;
    document.getElementById('sidebar-role').textContent = user.title || 'Sign out';
    document.getElementById('topbar-user').innerHTML = `${avatarHtml(user.name, user.avatarColor, 'sm')}<div><div class="name">${escapeHtml(user.name)}</div><div class="role">${escapeHtml(user.title || 'Member')}</div></div>`;

    function flattenDay(data) {
      return [
        ...data.overdue.map((task) => ({ ...task, label: 'Overdue', tone: 'pill-danger' })),
        ...data.todayTasks.map((task) => ({ ...task, label: 'Today', tone: 'pill-muted' })),
        ...data.dueSoon.map((task) => ({ ...task, label: 'Due Soon', tone: 'pill-ok' })),
      ];
    }

    function renderDay(items) {
      if (!items.length) {
        document.getElementById('task-list').innerHTML = '<div class="empty">You are all caught up today.</div>';
        return;
      }

      document.getElementById('task-list').innerHTML = items.map((task) => `
        <div class="task-row">
          <div>
            <div class="task-title">${escapeHtml(task.title)}</div>
            <div class="task-sub">${escapeHtml(task.project?.name || 'Project')} - ${task.dueDate ? fmtDate(task.dueDate) : 'No due date'}</div>
          </div>
          <div><span class="pill ${task.tone}">${task.label}</span></div>
          <div class="meta-text">${escapeHtml(task.priority)}</div>
          <div class="inline-actions">
            <button class="btn-soft" onclick="markDone('${task._id}')">Mark done</button>
          </div>
        </div>
      `).join('');
    }

    async function loadMyDay() {
      const data = await api('/myday');
      if (data) {
        renderDay(flattenDay(data));
      }
    }

    async function markDone(id) {
      const updated = await api(`/tasks/${id}`, {
        method: 'PATCH',
        body: JSON.stringify({ status: 'done' }),
      });

      if (updated) {
        showToast('Task updated.', 'success');
        loadMyDay();
      }
    }

    loadMyDay();
  </script>
</body>
</html>

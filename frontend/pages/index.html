<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SynergySphere</title>
  <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>
  <div class="auth-shell">
    <div class="auth-card">
      <section class="auth-brand-pane">
        <div>
          <h2>SynergySphere</h2>
          <p>Build faster with one collaborative command center for projects, tasks, updates, and team visibility.</p>
        </div>
        <p>Work like a modern product team.</p>
      </section>
      <section class="auth-form-pane">
        <div id="login-form">
          <h3>Welcome back</h3>
          <p class="sub">Sign in to continue</p>
          <form onsubmit="handleLogin(event)">
            <div class="field">
              <label>I am a</label>
              <select id="login-role" required>
                <option value="manager">Project Manager</option>
                <option value="developer" selected>Developer</option>
              </select>
            </div>
            <div class="field">
              <label>Email</label>
              <input type="email" id="login-email" placeholder="you@example.com" required oninput="syncDemoRole()">
            </div>
            <div class="field">
              <label>Password</label>
              <input type="password" id="login-password" placeholder="Enter password" required>
            </div>
            <button type="submit" class="action-btn w-full">Sign In</button>
          </form>
          <p class="sub" style="margin-top:14px;">No account? <a href="#" onclick="toggleAuth();return false;" style="color:#4f46e5;font-weight:700;">Create one</a></p>
        </div>

        <div id="signup-form" class="hidden">
          <h3>Create account</h3>
          <p class="sub">Start collaborating in minutes</p>
          <form onsubmit="handleSignup(event)">
            <div class="field">
              <label>Full Name</label>
              <input type="text" id="signup-name" placeholder="John Doe" required>
            </div>
            <div class="field">
              <label>Email</label>
              <input type="email" id="signup-email" placeholder="you@example.com" required>
            </div>
            <div class="field">
              <label>Account type</label>
              <select id="signup-role" required>
                <option value="manager">Project Manager</option>
                <option value="developer" selected>Developer</option>
              </select>
            </div>
            <div class="field">
              <label>Password</label>
              <input type="password" id="signup-password" placeholder="Minimum 6 characters" minlength="6" required>
            </div>
            <button type="submit" class="action-btn w-full">Create Account</button>
          </form>
          <p class="sub" style="margin-top:14px;">Already have an account? <a href="#" onclick="toggleAuth();return false;" style="color:#4f46e5;font-weight:700;">Sign in</a></p>
        </div>
      </section>
    </div>
  </div>

  <script src="/assets/js/api.js"></script>
  <script>
    if (getToken()) routeToRoleDashboard();

    function toggleAuth() {
      document.getElementById('login-form').classList.toggle('hidden');
      document.getElementById('signup-form').classList.toggle('hidden');
    }

    function syncDemoRole() {
      const email = document.getElementById('login-email').value.trim().toLowerCase();
      if (email === 'alice@demo.com') {
        document.getElementById('login-role').value = 'manager';
      }
    }

    async function handleLogin(e) {
      e.preventDefault();
      const selectedRole = document.getElementById('login-role').value;
      const data = await api('/auth/login', {
        method: 'POST',
        body: JSON.stringify({
          email: document.getElementById('login-email').value,
          password: document.getElementById('login-password').value,
        }),
      });
      if (data) {
        if (data.user.role !== selectedRole) {
          showToast(`This account is a ${data.user.role}, not a ${selectedRole}.`, 'error');
          return;
        }
        setAuth(data.token, data.user);
        routeToRoleDashboard();
      }
    }

    async function handleSignup(e) {
      e.preventDefault();
      const data = await api('/auth/signup', {
        method: 'POST',
        body: JSON.stringify({
          name: document.getElementById('signup-name').value,
          email: document.getElementById('signup-email').value,
          role: document.getElementById('signup-role').value,
          password: document.getElementById('signup-password').value,
        }),
      });
      if (data) {
        setAuth(data.token, data.user);
        routeToRoleDashboard();
      }
    }
  </script>
</body>
</html>
